[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx vite build"
watchPatterns = ["packages/admin/**"]

[deploy]
startCommand = "npx vite preview --port ${PORT:-3001} --host 0.0.0.0"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
