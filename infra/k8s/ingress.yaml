apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sunbull-ingress
  namespace: sunbull-ai
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - sunbull.ai
    - api.sunbull.ai
    - admin.sunbull.ai
    secretName: sunbull-tls
  rules:
  - host: sunbull.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: api.sunbull.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
  - host: admin.sunbull.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-service
            port:
              number: 80
