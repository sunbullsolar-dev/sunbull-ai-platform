apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: sunbull-ai
  labels:
    app: ml-service
    service: ml-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
      - name: ml-service
        image: sunbull-ai/ml-service:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ml-secrets
              key: openai-api-key
        - name: NREL_PVWATTS_API_KEY
          valueFrom:
            secretKeyRef:
              name: ml-secrets
              key: nrel-api-key
        - name: BACKEND_URL
          value: http://backend-service:80
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service-service
  namespace: sunbull-ai
  labels:
    app: ml-service
spec:
  selector:
    app: ml-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
    name: http
  type: ClusterIP
